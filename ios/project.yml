name: Nudget
options:
  bundleIdPrefix: app.nudget
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: VYC3499K46

packages:
  LinkKit:
    url: https://github.com/plaid/plaid-link-ios
    from: "6.4.7"

targets:
  Nudget:
    type: application
    platform: iOS
    sources:
      - Nudget
      - Shared
    dependencies:
      - package: LinkKit
      - target: NudgetWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.nudget.ios
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1" # iPhone
    entitlements:
      path: Nudget/Nudget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.nudget.ios
        # Dev push environment. Xcode flips this to "production" when archiving for
        # TestFlight/App Store; a dev build's token only works against APNs sandbox.
        aps-environment: development
    info:
      path: Nudget/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Allow the dev server over http://localhost while developing.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

  NudgetWidget:
    type: app-extension
    platform: iOS
    sources:
      - NudgetWidget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.nudget.ios.widget
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: NudgetWidget/NudgetWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.nudget.ios
    info:
      path: NudgetWidget/Info.plist
      properties:
        CFBundleDisplayName: Nudget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
